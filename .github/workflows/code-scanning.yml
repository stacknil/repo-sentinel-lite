name: Code Scanning

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  repo-sentinel-sarif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Generate SARIF
        run: |
          python -m repo_sentinel scan --format sarif . > results.sarif

      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-sentinel-lite-sarif
          path: results.sarif
          retention-days: 14
