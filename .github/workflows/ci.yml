name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run Ruff
        run: ruff check .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: |
          python -m twine check dist/*
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          expected = (
              "Install from production PyPI:",
              "python -m pip install repo-sentinel-lite",
              "Requires-Python: >=3.11",
              "Classifier: Programming Language :: Python :: 3.11",
              "Classifier: Programming Language :: Python :: 3.12",
              "Classifier: Programming Language :: Python :: 3.13",
              "Classifier: Programming Language :: Python :: 3.14",
          )
          deprecated_readme_fragments = (
              (
                  "Install from the latest tagged ",
                  "GitHub source release:",
              ),
              (
                  "git+https://github.com/stacknil/",
                  "repo-sentinel-lite.git@v",
                  "0.",
                  "6.",
                  "1",
              ),
              (
                  "`repo-sentinel-lite` is not published on ",
                  "production ",
                  "PyPI yet.",
              ),
          )
          forbidden = tuple(
              "".join(fragment) for fragment in deprecated_readme_fragments
          )

          metadata = []
          for wheel_path in Path("dist").glob("*.whl"):
              with zipfile.ZipFile(wheel_path) as archive:
                  metadata_name = next(
                      name for name in archive.namelist() if name.endswith("METADATA")
                  )
                  metadata.append(archive.read(metadata_name).decode("utf-8"))

          for sdist_path in Path("dist").glob("*.tar.gz"):
              with tarfile.open(sdist_path, "r:gz") as archive:
                  metadata_name = next(
                      name for name in archive.getnames() if name.endswith("PKG-INFO")
                  )
                  metadata_file = archive.extractfile(metadata_name)
                  if metadata_file is None:
                      raise SystemExit(f"Missing PKG-INFO in {sdist_path}")
                  metadata.append(metadata_file.read().decode("utf-8"))

          if not metadata:
              raise SystemExit("No distribution metadata found")

          for text in metadata:
              for value in expected:
                  if value not in text:
                      raise SystemExit(f"Missing metadata text: {value}")
              for value in forbidden:
                  if value in text:
                      raise SystemExit(f"Forbidden metadata text remains: {value}")
          PY
