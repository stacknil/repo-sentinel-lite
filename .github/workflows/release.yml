name: Release

# Configure Trusted Publishing with these values before enabling releases:
#   TestPyPI prereleases:
#     GitHub owner: stacknil
#     Repository name: repo-sentinel-lite
#     Workflow file: .github/workflows/release.yml
#     Environment name: testpypi
#     TestPyPI project: repo-sentinel-lite
#   PyPI stable releases:
#     GitHub owner: stacknil
#     Repository name: repo-sentinel-lite
#     Workflow file: .github/workflows/release.yml
#     Environment name: pypi
#     PyPI project: repo-sentinel-lite
#
# GitHub prereleases publish to TestPyPI. Stable GitHub releases publish to
# PyPI.

on:
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify release commit is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "Release tag must point to a commit reachable from origin/main"
            exit 1
          }

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          python - <<'PY'
          import os
          import re
          from importlib.util import module_from_spec, spec_from_file_location
          from pathlib import Path
          import tomllib

          release_tag = os.environ["RELEASE_TAG"]
          release_is_prerelease = os.environ["RELEASE_PRERELEASE"] == "true"
          expected_version = release_tag.removeprefix("v")
          version_is_rc = re.search(r"rc[0-9]+$", expected_version) is not None

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]

          init_path = Path("src/repo_sentinel/__init__.py")
          spec = spec_from_file_location("repo_sentinel", init_path)
          module = module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          package_version = module.__version__

          errors = []
          if not release_tag.startswith("v"):
              errors.append(f"Release tag must start with 'v': {release_tag}")
          if project_version != expected_version:
              errors.append(
                  f"pyproject.toml version {project_version} does not match tag {release_tag}"
              )
          if package_version != expected_version:
              errors.append(
                  f"src/repo_sentinel/__init__.py version {package_version} does not match tag {release_tag}"
              )
          if project_version != package_version:
              errors.append(
                  f"Version fields disagree: pyproject.toml={project_version}, __init__.py={package_version}"
              )
          if version_is_rc and not release_is_prerelease:
              errors.append(
                  f"Release tag {release_tag} is an rc version but the GitHub Release is not marked as a prerelease"
              )
          if release_is_prerelease and not version_is_rc:
              errors.append(
                  f"GitHub Release is marked as a prerelease but tag {release_tag} is not an rc version"
              )

          if errors:
              raise SystemExit("\n".join(errors))

          print(
              f"Verified release tag {release_tag} matches package version "
              f"{expected_version} and release routing"
          )
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  publish-testpypi:
    if: ${{ github.event.release.prerelease }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/repo-sentinel-lite/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ !github.event.release.prerelease }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/repo-sentinel-lite/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
