name: Pre-Commit Provider Validation

on:
  pull_request:
    paths:
      - .github/workflows/pre-commit-provider.yml
      - .pre-commit-hooks.yaml
      - README.md
      - docs/pre-commit.md
      - pyproject.toml
      - src/repo_sentinel/**
      - tests/validate_pre_commit_provider.py
  push:
    paths:
      - .github/workflows/pre-commit-provider.yml
      - .pre-commit-hooks.yaml
      - README.md
      - docs/pre-commit.md
      - pyproject.toml
      - src/repo_sentinel/**
      - tests/validate_pre_commit_provider.py
  workflow_dispatch:

jobs:
  validate-provider:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install provider validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pre-commit

      - name: Validate hook manifest
        run: pre-commit validate-manifest .pre-commit-hooks.yaml

      - name: Run provider self-test
        run: python tests/validate_pre_commit_provider.py
